name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8
          cache: maven
      - name: Test
        run: mvn test
      - name: Chaos Benchmark Smoke
        run: ./scripts/run_chaos_benchmark.sh 5
